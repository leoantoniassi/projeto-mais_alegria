apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: mais-alegria
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
  # ClusterIP: apenas acessível de dentro do cluster
  # O frontend (Nginx) faz proxy reverso para backend-service:3001
  type: ClusterIP
