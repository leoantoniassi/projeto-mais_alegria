apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: mais-alegria
type: Opaque
# ATENÇÃO: Este é um arquivo de EXEMPLO. Não contém credenciais reais.
# Copie este arquivo para secret.yaml e preencha com os valores reais:
#
#   Para gerar um valor base64:
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("seu-jwt-secret"))
#   Linux/Mac:  echo -n "seu-jwt-secret" | base64
#
data:
  JWT_SECRET: <base64 do seu JWT secret>
