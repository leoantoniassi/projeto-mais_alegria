apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: mais-alegria
type: Opaque
# ATENÇÃO: Este é um arquivo de EXEMPLO. Não contém credenciais reais.
# Copie este arquivo para secret.yaml e preencha com os valores reais:
#
#   Para gerar um valor base64:
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("seu-valor"))
#   Linux/Mac:  echo -n "seu-valor" | base64
#
data:
  DB_USER: <base64 do nome do usuário>
  DB_PASS: <base64 da senha>
  DB_NAME: <base64 do nome do banco>
